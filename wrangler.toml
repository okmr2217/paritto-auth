name = "paritto-auth"
main = "src/index.ts"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
route = { pattern = "auth.paritto.dev/*", zone_name = "paritto.dev" }

# ====================
# Hyperdrive (DB プーリング)
# ====================
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "14b734a9c28b457aa66665a0860d3bd9"

# ====================
# KV (レート制限カウンタ用)
# ====================
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "c12fb1c9478a490ba56cd24a7cb045ff"

# ====================
# 環境変数（公開可・非機密）
# ====================
[vars]
BETTER_AUTH_URL = "https://auth.paritto.dev"
NODE_ENV = "production"
TRUSTED_ORIGINS = "https://yarukoto.paritto.dev,https://peaklog.paritto.dev,https://tsukekan.paritto.dev"

UNVERIFIED_ACCOUNT_RETENTION_DAYS = "7"

JWT_ISSUER = "https://auth.paritto.dev"
ACCESS_TOKEN_TTL_SECONDS = "900"
REFRESH_TOKEN_TTL_SECONDS = "2592000"

RATE_LIMIT_LOGIN_PER_MIN = "5"
RATE_LIMIT_REGISTER_PER_HOUR = "3"
RATE_LIMIT_PASSWORD_RESET_PER_HOUR = "3"
RATE_LIMIT_TOKEN_PER_MIN = "30"

# ====================
# Secrets (wrangler secret put で投入済み)
# DATABASE_URL
# BETTER_AUTH_SECRET
# RESEND_API_KEY
# RESEND_FROM_EMAIL
# ====================

# ====================
# Cron Triggers
# ====================
[triggers]
crons = ["0 3 * * *"]

# ====================
# Observability
# ====================
[observability]
enabled = true
head_sampling_rate = 1
